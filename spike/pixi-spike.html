<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Factopolis — Spike PixiJS vs Canvas2D (5000 entités)</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0d1b2a;font:13px/1.4 system-ui,sans-serif;color:#e8eef5;}
  #stage,#cv2d{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
  #cv2d{display:none;}
  #hud{position:absolute;top:10px;left:10px;z-index:10;background:rgba(10,20,32,.82);
       border:1px solid #24384f;border-radius:10px;padding:12px 14px;min-width:250px;
       box-shadow:0 6px 24px rgba(0,0,0,.4);backdrop-filter:blur(3px);}
  #hud h1{margin:0 0 8px;font-size:14px;font-weight:700;letter-spacing:.3px;}
  #hud .row{display:flex;justify-content:space-between;gap:12px;margin:3px 0;}
  #hud .big{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;}
  #hud .fps-good{color:#4ade80;} #hud .fps-mid{color:#fbbf24;} #hud .fps-bad{color:#f87171;}
  #hud .k{color:#8fa9c4;}
  #hud .grp{margin-top:10px;padding-top:9px;border-top:1px solid #22364c;}
  #hud button{background:#1c2f45;color:#e8eef5;border:1px solid #33506f;
    border-radius:7px;padding:5px 9px;cursor:pointer;font-size:12px;margin:2px 3px 2px 0;}
  #hud button:hover{background:#264057;}
  #hud button.on{background:#2563eb;border-color:#3b82f6;font-weight:700;}
  #hud .hint{margin-top:9px;color:#7d96b0;font-size:11px;line-height:1.5;}
  #pick{position:absolute;bottom:12px;left:12px;z-index:10;background:rgba(10,20,32,.82);
        border:1px solid #24384f;border-radius:8px;padding:7px 11px;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<canvas id="cv2d"></canvas>

<div id="hud">
  <h1>Spike rendu — 5000 entités</h1>
  <div class="row"><span class="k">FPS</span><span id="fps" class="big">–</span></div>
  <div class="row"><span class="k">ms / frame</span><span id="ms">–</span></div>
  <div class="row"><span class="k">entités visibles</span><span id="vis">–</span></div>
  <div class="row"><span class="k">zoom</span><span id="zoom">–</span></div>

  <div class="grp">
    <div class="k" style="margin-bottom:4px">Backend</div>
    <button id="bkPixi" class="on">PixiJS (WebGL)</button>
    <button id="bkC2d">Canvas2D</button>
  </div>
  <div class="grp">
    <div class="k" style="margin-bottom:4px">Nombre d'entités</div>
    <button data-n="1000">1 000</button>
    <button data-n="5000" class="on">5 000</button>
    <button data-n="10000">10 000</button>
    <button data-n="20000">20 000</button>
  </div>
  <div class="grp">
    <div class="k" style="margin-bottom:4px">Options</div>
    <button id="optSort" class="on">tri profondeur</button>
    <button id="optCull" class="on">culling</button>
    <button id="optMove" class="on">mouvement</button>
  </div>
  <div class="hint">Glisser = déplacer · molette = zoom · clic = sélectionner l'entité la plus proche.<br>
    Dézoome à fond et déplace : c'est le pire cas (le plus d'entités à l'écran).</div>
</div>
<div id="pick">Aucune sélection</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.min.js"></script>
<script>
// ===========================================================================
// Spike Factopolis — mesure le rendu de N entités mobiles, PixiJS vs Canvas2D,
// avec LA MÊME projection iso, caméra et simulation que le jeu. But : savoir si
// WebGL tient 5000+ entités animées à 60 fps avant de migrer 07_rendering.js.
//
// Isolé : ne touche à aucun fichier du jeu. Charge Pixi v8 depuis un CDN.
// ===========================================================================

// --- Constantes reprises telles quelles du jeu (js/01_definitions.js) --------
const TW = 64, TH = 36, TW2 = TW/2, TH2 = TH/2;   // tuile iso écran
const ZOOM_MIN = 0.35, ZOOM_MAX = 2.4;            // js/02_world_state.js
const MAP = 128;                                  // taille carte (tuiles)
// Projection iso identique au jeu : iso(u,v) = [(u-v)*TW2, (u+v)*TH2]
const isoX = (u,v) => (u - v) * TW2;
const isoY = (u,v) => (u + v) * TH2;

// --- Caméra (mêmes sémantiques que le jeu : cam en px iso monde, z = zoom) ----
const cam = { x: 0, y: 0, z: 0.5 };
let DPR = Math.min(window.devicePixelRatio || 1, 2);
let W = innerWidth, H = innerHeight;

// Centrer la caméra sur le milieu de la carte
function centerCam(){
  const cx = isoX(MAP/2, MAP/2), cy = isoY(MAP/2, MAP/2);
  cam.x = cx - (W/2)/cam.z;
  cam.y = cy - (H/2)/cam.z;
}

// --- Simulation d'entités : position tile (u,v) + vitesse, rebond aux bords ---
let COUNT = 5000;
let ents = [];
function makeEnts(n){
  ents = new Array(n);
  for(let i=0;i<n;i++){
    ents[i] = {
      u: Math.random()*MAP, v: Math.random()*MAP,
      du: (Math.random()*2-1)*3.0, dv: (Math.random()*2-1)*3.0, // tuiles/s
      tint: (Math.random()*0xffffff)|0,
      spr: null, // sprite Pixi (rempli en mode pixi)
    };
  }
  COUNT = n;
  pixiSyncSprites(); // (re)construit le pool de sprites si backend pixi
}
function stepEnts(dt){
  if(!optMove) return;
  for(let i=0;i<ents.length;i++){
    const e = ents[i];
    e.u += e.du*dt; e.v += e.dv*dt;
    if(e.u < 0){ e.u = 0; e.du = Math.abs(e.du); } else if(e.u > MAP){ e.u = MAP; e.du = -Math.abs(e.du); }
    if(e.v < 0){ e.v = 0; e.dv = Math.abs(e.dv); } else if(e.v > MAP){ e.v = MAP; e.dv = -Math.abs(e.dv); }
  }
}

// --- Options -----------------------------------------------------------------
let backend = 'pixi';     // 'pixi' | 'c2d'
let optSort = true;       // tri profondeur (z = u+v)
let optCull = true;       // ne rendre que les entités dans le viewport
let optMove = true;       // animation

// ===========================================================================
// BACKEND PIXI (WebGL)
// ===========================================================================
let app = null, world = null, entTex = null, pixiReady = false;

async function initPixi(){
  app = new PIXI.Application();
  await app.init({
    canvas: document.getElementById('stage'),
    width: W, height: H, resolution: DPR, autoDensity: true,
    background: '#132a3f', antialias: true, powerPreference: 'high-performance',
    autoStart: false, // on pilote app.render() nous-mêmes dans la boucle (mesure propre)
  });
  // Texture d'entité : un petit "camion" iso, générée une fois → sprites batchés.
  const g = new PIXI.Graphics();
  g.ellipse(0, 5, 9, 4).fill({ color: 0x000000, alpha: 0.18 });     // ombre
  g.roundRect(-8, -6, 16, 11, 3).fill(0xffffff);                    // caisse (blanche → teintable)
  g.roundRect(-8, -6, 6, 11, 2).fill(0xdfe8f2);                     // cabine
  g.stroke({ width: 1, color: 0x223344, alpha: 0.35 });
  entTex = app.renderer.generateTexture({ target: g, resolution: 2 });

  world = new PIXI.Container();
  world.sortableChildren = optSort;
  app.stage.addChild(world);
  pixiReady = true;
  pixiSyncSprites();
}

// (Re)crée un pool de sprites égal au nombre d'entités.
function pixiSyncSprites(){
  if(!pixiReady || backend !== 'pixi') return;
  world.removeChildren();
  for(let i=0;i<ents.length;i++){
    const s = new PIXI.Sprite(entTex);
    s.anchor.set(0.5, 0.7);
    s.tint = ents[i].tint;
    ents[i].spr = s;
    world.addChild(s);
  }
}

function renderPixi(){
  // Caméra = échelle + position du conteneur monde (identique au setTransform du jeu).
  world.scale.set(cam.z);
  world.position.set(-cam.x*cam.z, -cam.y*cam.z);
  world.sortableChildren = optSort;

  const [vu0,vu1,vv0,vv1] = viewIsoBounds();
  let vis = 0;
  for(let i=0;i<ents.length;i++){
    const e = ents[i], s = e.spr;
    const x = isoX(e.u, e.v), y = isoY(e.u, e.v);
    if(optCull && (x < vu0 || x > vu1 || y < vv0 || y > vv1)){ s.visible = false; continue; }
    s.visible = true; vis++;
    s.x = x; s.y = y;
    if(optSort) s.zIndex = e.u + e.v;
    // orientation selon la vitesse (en repère écran)
    s.rotation = Math.atan2(isoY(e.du, e.dv), isoX(e.du, e.dv));
  }
  lastVisible = vis;
  // Le rendu réel est déclenché par app.ticker (app.render()).
}

// ===========================================================================
// BACKEND CANVAS2D (style vectoriel actuel du jeu : ~drawTruck)
// ===========================================================================
const cv2d = document.getElementById('cv2d');
const ctx = cv2d.getContext('2d');

function renderC2D(){
  cv2d.width = W*DPR; cv2d.height = H*DPR;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle = '#132a3f';
  ctx.fillRect(0,0,cv2d.width,cv2d.height);
  // Transform caméra identique au jeu.
  ctx.setTransform(DPR*cam.z, 0, 0, DPR*cam.z, -cam.x*DPR*cam.z, -cam.y*DPR*cam.z);

  const [vu0,vu1,vv0,vv1] = viewIsoBounds();
  // Tri profondeur : on trie des index (comme sprites.sort du jeu).
  let order = ents;
  if(optSort){
    order = ents.slice().sort((a,b)=> (a.u+a.v)-(b.u+b.v));
  }
  let vis = 0;
  for(let i=0;i<order.length;i++){
    const e = order[i];
    const x = isoX(e.u, e.v), y = isoY(e.u, e.v);
    if(optCull && (x < vu0 || x > vu1 || y < vv0 || y > vv1)) continue;
    vis++;
    // ~drawTruck : ombre + caisse + cabine (dessin vectoriel, non cachable)
    ctx.fillStyle = 'rgba(0,0,0,.18)';
    ctx.beginPath(); ctx.ellipse(x, y+5, 9, 4, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#'+(e.tint.toString(16).padStart(6,'0'));
    roundRect(x-8, y-6, 16, 11, 3); ctx.fill();
    ctx.fillStyle = '#dfe8f2';
    roundRect(x-8, y-6, 6, 11, 2); ctx.fill();
  }
  lastVisible = vis;
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

// ===========================================================================
// Viewport iso bounds (px monde) pour le culling — marge pour la taille sprite.
// ===========================================================================
function viewIsoBounds(){
  const m = 40;
  return [ cam.x - m, cam.x + W/cam.z + m, cam.y - m, cam.y + H/cam.z + m ];
}

// ===========================================================================
// Boucle : simulation + rendu du backend actif + HUD
// ===========================================================================
let lastVisible = 0;
let last = performance.now();
let fpsAcc = 0, fpsN = 0, msAcc = 0, hudLast = 0;

function frame(now){
  const dt = Math.min(0.05, (now-last)/1000); last = now;
  stepEnts(dt);

  const t0 = performance.now();
  if(backend === 'pixi'){
    if(pixiReady){ renderPixi(); app.render(); }
  } else {
    renderC2D();
  }
  const t1 = performance.now();

  // HUD (moyenne ~4/s)
  msAcc += (t1 - t0); fpsAcc += 1000/Math.max(0.0001, now - (frame._p||now)); frame._p = now; fpsN++;
  if(now - hudLast > 250){
    const fps = fpsAcc/fpsN, ms = msAcc/fpsN;
    const el = document.getElementById('fps');
    el.textContent = fps.toFixed(0);
    el.className = 'big ' + (fps>=55?'fps-good':fps>=30?'fps-mid':'fps-bad');
    document.getElementById('ms').textContent = ms.toFixed(1)+' ms';
    document.getElementById('vis').textContent = lastVisible.toLocaleString('fr');
    document.getElementById('zoom').textContent = cam.z.toFixed(2);
    fpsAcc=fpsN=msAcc=0; hudLast=now;
  }
  requestAnimationFrame(frame);
}

// ===========================================================================
// Contrôles caméra (mêmes formules que le jeu)
// ===========================================================================
let dragging = false, lastX=0, lastY=0;
addEventListener('pointerdown', e=>{ if(e.target.closest('#hud'))return; dragging=true; lastX=e.clientX; lastY=e.clientY; });
addEventListener('pointerup', ()=> dragging=false);
addEventListener('pointermove', e=>{
  if(!dragging) return;
  cam.x -= (e.clientX-lastX)/cam.z; cam.y -= (e.clientY-lastY)/cam.z;
  lastX=e.clientX; lastY=e.clientY;
});
addEventListener('wheel', e=>{
  if(e.target.closest('#hud')) return;
  e.preventDefault();
  const z2 = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, cam.z * (e.deltaY<0 ? 1.1 : 1/1.1)));
  // zoom ancré sous le curseur (comme le jeu)
  cam.x += e.clientX/cam.z - e.clientX/z2;
  cam.y += e.clientY/cam.z - e.clientY/z2;
  cam.z = z2;
}, { passive:false });

// Picking : clic → entité la plus proche (hit-test manuel, PAS d'interaction Pixi).
addEventListener('click', e=>{
  if(e.target.closest('#hud')) return;
  const wx = cam.x + e.clientX/cam.z, wy = cam.y + e.clientY/cam.z; // écran → px monde
  let best=-1, bestD=1e9;
  for(let i=0;i<ents.length;i++){
    const dx = isoX(ents[i].u,ents[i].v)-wx, dy = isoY(ents[i].u,ents[i].v)-wy;
    const d = dx*dx+dy*dy;
    if(d<bestD){ bestD=d; best=i; }
  }
  const p = document.getElementById('pick');
  if(best>=0 && bestD < 40*40){
    const e2 = ents[best];
    p.textContent = `Entité #${best} — tuile (${e2.u.toFixed(1)}, ${e2.v.toFixed(1)}) — dist ${Math.sqrt(bestD).toFixed(0)}px`;
  } else p.textContent = 'Aucune entité proche du clic';
});

// ===========================================================================
// UI (boutons)
// ===========================================================================
function setBackend(b){
  backend = b;
  document.getElementById('bkPixi').classList.toggle('on', b==='pixi');
  document.getElementById('bkC2d').classList.toggle('on', b==='c2d');
  document.getElementById('stage').style.display = b==='pixi' ? 'block':'none';
  document.getElementById('cv2d').style.display  = b==='c2d'  ? 'block':'none';
  if(b==='pixi') pixiSyncSprites();
}
document.getElementById('bkPixi').onclick = ()=> setBackend('pixi');
document.getElementById('bkC2d').onclick  = ()=> setBackend('c2d');
document.querySelectorAll('#hud [data-n]').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('#hud [data-n]').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    makeEnts(+btn.dataset.n);
  };
});
const tog = (id, get, set)=>{ const b=document.getElementById(id);
  b.onclick=()=>{ set(!get()); b.classList.toggle('on', get()); }; };
tog('optSort', ()=>optSort, v=>optSort=v);
tog('optCull', ()=>optCull, v=>optCull=v);
tog('optMove', ()=>optMove, v=>optMove=v);

addEventListener('resize', ()=>{
  W=innerWidth; H=innerHeight;
  if(app) app.renderer.resize(W,H);
});

// ===========================================================================
// Boot
// ===========================================================================
(async function boot(){
  cam.z = 0.5; centerCam();
  makeEnts(COUNT);
  await initPixi();
  makeEnts(COUNT); // resync sprites maintenant que Pixi est prêt
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
